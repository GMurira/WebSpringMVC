spring.application.name=runner
spring.datasource.url=jdbc:postgresql://localhost:5432/runnerz
spring.datasource.username=runnerz
spring.datasource.password=password
# SQL Initialization (This replaces Hibernate's ddl-auto)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
# Set this to false temporarily to see the EXACT error if the script fails
spring.sql.init.continue-on-error=false